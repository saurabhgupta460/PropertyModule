<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header with Back button -->
        <header class="flex items-center justify-between mb-8">
            <a href="Property_listing.html" id="back-to-listing-btn" class="text-gray-600 hover:text-gray-800 transition-colors flex items-center">
                <i class="fas fa-arrow-left mr-2"></i>
                <span class="font-medium">Back to Property Listing</span>
            </a>
            <h1 class="text-3xl font-bold text-gray-800">Global Settings</h1>
        </header>

        <!-- Settings Cards Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- Customize Template Card -->
            <a href="customize_template.html" id="customize-template-card" class="block bg-white rounded-xl shadow-lg p-6 hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
                <div class="flex items-center mb-4">
                    <div class="bg-indigo-100 text-indigo-600 p-3 rounded-full">
                        <i class="fas fa-palette fa-lg"></i>
                    </div>
                    <h2 class="text-xl font-semibold text-gray-800 ml-4">Customize Template</h2>
                </div>
                <p class="text-gray-600">Modify and manage your lease agreements, renewal notices, and other document templates.</p>
            </a>

            <!-- Revenue Management Card -->
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center mb-4">
                    <div class="bg-green-100 text-green-600 p-3 rounded-full">
                        <i class="fas fa-hand-holding-usd fa-lg"></i>
                    </div>
                    <h2 class="text-xl font-semibold text-gray-800 ml-4">Revenue Management</h2>
                </div>
                <p class="text-gray-600 mb-6">Configure global settings for property manager revenue streams.</p>
                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="font-medium text-gray-700">Kept by PM</span>
                        <label for="kept-by-pm-toggle" class="inline-flex relative items-center cursor-pointer">
                            <input type="checkbox" id="kept-by-pm-toggle" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-4 peer-focus:ring-indigo-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="font-medium text-gray-700">Markup Expense</span>
                        <label for="markup-expense-toggle" class="inline-flex relative items-center cursor-pointer">
                            <input type="checkbox" id="markup-expense-toggle" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-focus:ring-4 peer-focus:ring-indigo-300 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Other global setting cards can be added here in the future -->
        </div>
    </div>

    <script src="global_setting.js" defer></script>
</body>
</html>
