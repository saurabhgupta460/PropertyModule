<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="p-4 sm:p-8">
    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-8">
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-4">
                <a href="Property_listing.html" class="text-gray-600 hover:text-gray-800 transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Property Listing
                </a>
                <h1 class="text-2xl font-bold text-gray-800">Add Expense</h1>
            </div>
        </header>

        <form id="addExpenseForm" class="space-y-6">
            <!-- Bill Items Table -->
            <div class="mt-6">
                <h4 class="text-sm font-medium text-gray-700 mb-2">Expense Items</h4>
                <div class="overflow-x-auto border rounded-lg">
                    <table class="min-w-full divide-y divide-gray-200" id="billItemsTable">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-48">Property</th>
                                <th scope="col" class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-32">Unit</th>
                                <th scope="col" class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-40">Expense</th>
                                <th scope="col" class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
                                <th scope="col" class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-32">Amount</th>
                                <th scope="col" class="px-4 py-2 text-center text-xs font-medium text-gray-500 uppercase tracking-wider w-10"></th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200" id="billItemsBody">
                            <!-- Rows will be added here via JS -->
                        </tbody>
                    </table>
                </div>
                <div class="flex justify-between items-center mt-3">
                    <button type="button" id="addBillItemBtn" class="text-sm text-blue-600 hover:text-blue-800 font-medium focus:outline-none flex items-center">
                        <i class="fas fa-plus-circle mr-1"></i> Add Row
                    </button>
                </div>
                <div class="flex justify-end mt-4">
                    <!-- Bill Summary -->
                    <div class="w-full md:w-1/3 space-y-3 p-4 border rounded-lg bg-gray-50">
                        <div class="flex justify-between items-center">
                            <span class="text-base font-bold text-gray-800">Expense Amount:</span>
                            <span id="billTotalDisplay" class="text-lg font-bold text-gray-900 ml-2">$0.00</span>
                        </div>
                        <div class="flex justify-between items-center relative group">
                            <label for="billMarkup" class="text-sm font-medium text-gray-500 cursor-help flex items-center">
                                Mark Up
                            </label>
                            <input type="text" id="billMarkup" name="billMarkup" class="w-32 px-2 py-1 text-right rounded-md border-gray-300 bg-gray-100 focus:outline-none text-sm" readonly placeholder="$0.00">
                        </div>
                        <div class="flex justify-between items-center relative group">
                            <label for="billDiscount" class="text-sm font-medium text-gray-500 cursor-help flex items-center">
                                Discount
                            </label>
                            <input type="text" id="billDiscount" name="billDiscount" class="w-32 px-2 py-1 text-right rounded-md border-gray-300 bg-gray-100 focus:outline-none text-sm" readonly placeholder="$0.00">
                        </div>
                        <div class="flex justify-between items-center relative group">
                            <label for="billSalesTax" class="text-sm font-medium text-gray-500 cursor-help flex items-center">
                                Sales Tax
                            </label>
                            <input type="text" id="billSalesTax" name="billSalesTax" class="w-32 px-2 py-1 text-right rounded-md border-gray-300 bg-gray-100 focus:outline-none text-sm" readonly placeholder="$0.00">
                        </div>
                        <div class="flex justify-between items-center border-t pt-2 mt-2">
                            <span class="text-base font-bold text-gray-800">Total Amount:</span>
                            <span id="grandTotalDisplay" class="text-lg font-bold text-blue-600 ml-2">$0.00</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <div>
                    <label for="paymentDate" class="block text-sm font-medium text-gray-700 mb-1">Payment Date</label>
                    <input type="date" id="paymentDate" name="paymentDate" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label for="bankName" class="block text-sm font-medium text-gray-700 mb-1">Bank Name</label>
                    <input type="text" id="bankName" name="bankName" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Bank Name">
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <div>
                    <label for="paymentType" class="block text-sm font-medium text-gray-700 mb-1">Payment Type</label>
                    <input type="text" id="paymentType" name="paymentType" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Payment Type">
                </div>
                <div>
                    <label for="paymentMethod" class="block text-sm font-medium text-gray-700 mb-1">Payment Method</label>
                    <input type="text" id="paymentMethod" name="paymentMethod" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Payment Method">
                </div>
                 <div>
                    <label for="refNumber" class="block text-sm font-medium text-gray-700 mb-1">Reference Number</label>
                    <input type="text" id="refNumber" name="refNumber" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-end space-x-4 pt-4 border-t border-gray-100">
                <a href="Property_listing.html" class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">Cancel</a>
                <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors shadow-md">Add Expense</button>
            </div>
        </form>
    </div>
    <script src="propery_Add_exp.js"></script>
</body>
</html>
