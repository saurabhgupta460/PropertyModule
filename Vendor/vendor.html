<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .balance-positive {
            color: #15803d; /* Tailwind green-700 */
        }
        .balance-negative {
            color: #dc2626; /* Tailwind red-600 */
        }
        @media (max-width: 768px) {
            .hide-on-mobile {
                display: none;
            }
            .responsive-table {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <!-- Vendor Listing Page -->
    <div id="listingPage" class="max-w-7xl mx-auto bg-white rounded-xl shadow-lg p-6 sm:p-8">
        <header class="flex flex-col sm:flex-row items-center justify-between mb-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-4 sm:mb-0">Vendor Listing</h1>
            <div class="flex items-center space-x-4">
              <button id="addVendorBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg shadow-md hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                  <i class="fas fa-plus mr-2"></i> Add Vendor
              </button>
              <a href="globalsettingvendor.html" class="bg-white text-gray-700 px-4 py-2 rounded-lg shadow-md hover:bg-gray-100 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 border border-gray-300">
                  <i class="fas fa-cog mr-2"></i> Global Settings
              </a>
            </div>
        </header>

        <div class="flex flex-col sm:flex-row items-center justify-between mb-6 space-y-4 sm:space-y-0 sm:space-x-4">
            <div class="relative w-full sm:w-1/2">
                <input type="text" id="searchInput" placeholder="Search vendors..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            </div>
        </div>

        <div class="responsive-table">
            <table class="min-w-full divide-y divide-gray-200 rounded-lg overflow-hidden">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Vendor Name</th>
                        <th class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider hide-on-mobile">Contact</th>
                        <th class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Service</th>
                        <th class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Balance</th>
                        <th class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="vendorTableBody" class="bg-white divide-y divide-gray-200 cursor-pointer">
                    <!-- Vendor data will be rendered here by JavaScript -->
                </tbody>
            </table>
        </div>

        <div id="pagination" class="mt-6 flex items-center justify-between">
            <span id="pageInfo" class="text-sm text-gray-700"></span>
            <div class="flex space-x-2">
                <button id="prevBtn" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-200 rounded-lg hover:bg-gray-300 transition-colors focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    Previous
                </button>
                <button id="nextBtn" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-200 rounded-lg hover:bg-gray-300 transition-colors focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">
                    Next
                </button>
            </div>
        </div>
    </div>

    <!-- Vendor Details Page -->
    <div id="detailsPage" class="hidden max-w-7xl mx-auto bg-white rounded-xl shadow-lg p-6 sm:p-8">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6">
            <div class="flex items-center space-x-4">
                <button id="backBtn" class="text-gray-600 hover:text-gray-800 transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Listing
                </button>
                <div class="flex items-center border rounded-lg">
                    <button id="prevVendorBtn" class="px-3 py-2 text-gray-500 hover:bg-gray-100 rounded-l-lg border-r"><i class="fas fa-chevron-left"></i></button>
                    <div id="vendorSwitcherContainer" class="relative">
                        <input type="text" id="vendorSwitcherInput" class="text-xl sm:text-2xl font-bold text-gray-800 bg-transparent border-none focus:ring-0 w-full" autocomplete="off">
                        <i class="fas fa-chevron-down absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-500 pointer-events-none"></i>
                        <div id="vendorSwitcherDropdown" class="hidden absolute left-0 mt-2 w-72 sm:w-96 bg-white rounded-md shadow-lg z-20 max-h-60 overflow-y-auto border"></div>
                    </div>
                    <button id="nextVendorBtn" class="px-3 py-2 text-gray-500 hover:bg-gray-100 rounded-r-lg border-l"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <p id="vendorCategory" class="text-gray-600 mt-2 sm:mt-0"></p>
        </div>

        <div class="border-b border-gray-200">
            <nav class="-mb-px flex space-x-8" aria-label="Tabs">
                <button data-tab="overview" class="tab-button border-b-2 border-transparent py-4 px-1 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300">
                    Overview
                </button>
                <button data-tab="transaction" class="tab-button border-b-2 border-transparent py-4 px-1 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300">
                    Transaction
                </button>
            </nav>
        </div>

        <div id="tabContent" class="mt-6">
            <!-- Overview Tab -->
            <div id="overview-content" class="tab-content space-y-6" data-tab="overview">
                <!-- Overview content will be rendered here by JS -->
                 <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-gray-50 p-4 rounded-lg border">
                        <h4 class="text-sm font-medium text-gray-500">Total Billed</h4>
                        <p id="overview-total-billed" class="text-2xl font-bold text-gray-800 mt-1"></p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg border">
                        <h4 class="text-sm font-medium text-gray-500">Total Paid</h4>
                        <p id="overview-total-paid" class="text-2xl font-bold text-green-600 mt-1"></p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg border">
                        <h4 class="text-sm font-medium text-gray-500">Current Balance</h4>
                        <p id="overview-balance" class="text-2xl font-bold text-red-600 mt-1"></p>
                    </div>
                </div>
                <div class="bg-white rounded-lg shadow p-5 border">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Vendor Details</h3>
                    <div id="vendor-details-list" class="space-y-2">
                        <!-- Details like contact, address etc. will be rendered here -->
                    </div>
                </div>
            </div>

            <!-- Transaction Tab -->
            <div id="transaction-content" class="tab-content hidden" data-tab="transaction">
                <div class="flex justify-end mb-4 space-x-3">
                     <button id="postBillBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
                        <i class="fas fa-file-invoice-dollar mr-2"></i> Create Bill
                    </button>
                     <button id="postRubsBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">
                        <i class="fas fa-bolt mr-2"></i> Create RUBS
                    </button>
                     <button id="addExpenseBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition-colors">
                        <i class="fas fa-plus-circle mr-2"></i> Add Expenses
                    </button>
                </div>
                <div id="transaction-list-container" class="overflow-x-auto border rounded-lg">
                    <!-- Transaction table will be rendered here by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Modal/Message Box -->
    <div id="customModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
      <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
        <div class="mt-3 text-center">
          <h3 class="text-lg leading-6 font-medium text-gray-900" id="modalTitle"></h3>
          <div class="mt-2 px-7 py-3">
            <p class="text-sm text-gray-500" id="modalMessage"></p>
          </div>
          <div class="items-center px-4 py-3">
            <button id="modalCloseBtn" class="px-4 py-2 bg-blue-500 text-white text-base font-medium rounded-md w-full shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
              OK
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="vendor.js" defer></script>
</body>
</html>
